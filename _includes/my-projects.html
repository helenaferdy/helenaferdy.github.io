<!-- My Other Projects panel component -->

{% if site.data.projects and site.data.projects.size > 0 %}
  <div id="access-projects" style="margin-bottom: 2.5rem !important;">
    <div class="panel-heading">MY OTHER PROJECTS</div>
    <ul class="post-content list-unstyled ps-0 pb-1 ms-1 mt-2">
      {% for project in site.data.projects %}
        <li class="project-item text-truncate lh-lg mb-1" style="position: relative; padding-left: 1.1rem !important;">
          <a href="{{ project.url }}" target="_blank" rel="noopener" class="project-link" style="font-weight: 500;">
            {{ project.name }}
          </a>
        </li>
      {% endfor %}
    </ul>
  </div>

  <style>
    #access-projects .project-link::before {
      content: "•";
      color: currentColor;
      font-size: 1.6rem;
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-52%);
      transition: color 0.25s ease;
    }
    #access-projects .project-item {
      transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #access-projects .project-item:hover {
      transform: translateX(4px);
    }
    #access-projects .project-link {
      color: var(--text-muted-color);
      transition: color 0.25s ease;
      text-decoration: none !important;
    }
    #access-projects .project-item:hover .project-link {
      color: var(--link-color) !important;
    }
  </style>
{% endif %}
